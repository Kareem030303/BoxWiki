<!DOCTYPE html>
<html>
<head>
<title>Fighter Profile | BoxWiki</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.card{
    background:#1c1c1c;
    max-width:700px;
    margin:15px auto;
    padding:15px;
    border-radius:10px;
    text-align:left;
}

h1{
    color:gold;
}

.bar{
    background:#333;
    border-radius:10px;
    margin:5px 0;
    overflow:hidden;
}

.fill{
    height:15px;
    background:gold;
}
</style>

</head>

<body>

<h1>🥊 Fighter Name</h1>

<div class="card">
<p><b>Record:</b> 0-0</p>
<p><b>Division:</b> Heavyweight</p>
<p><b>Style:</b> Pressure Fighter</p>
</div>

<div class="card">
<h2>📊 Stats</h2>

<p>Power</p>
<div class="bar"><div class="fill" style="width:90%"></div></div>

<p>Speed</p>
<div class="bar"><div class="fill" style="width:80%"></div></div>

<p>Defense</p>
<div class="bar"><div class="fill" style="width:70%"></div></div>

<p>Stamina</p>
<div class="bar"><div class="fill" style="width:85%"></div></div>
</div>

<div class="card">
<h2>🥊 Biography</h2>
<p>
Write the fighter’s story here. Their rise, achievements, and fighting style.
</p>
</div>

<div class="card">
<h2>🏆 Achievements</h2>
<ul>
<li>World Champion</li>
<li>Title Defenses</li>
<li>Notable Wins</li>
</ul>
</div>

<div class="card">
<a href="index.html" style="
background:gold;
color:black;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
display:inline-block;
">
🏠 Back to Home
</a>
</div>

</body>
</html>
