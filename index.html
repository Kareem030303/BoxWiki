<!DOCTYPE html>
<html>
<head>
    <title>BoxWiki</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0b0b;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        p {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .card {
            background: #1c1c1c;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            overflow: hidden;
            transition: 0.2s;
            display: block;
        }

        .card:hover {
            transform: scale(1.05);
            background: #2a2a2a;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
        }
    </style>
</head>

<body>

<h1>BoxWiki 🥊</h1>
<p>Your boxing encyclopedia of legends</p>

<div class="grid">

    <a class="card" href="muhammad-ali.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5d/Muhammad_Ali%2C_1967.jpg">
        <h3>Muhammad Ali</h3>
    </a>

    <a class="card" href="mike-tyson.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Mike_Tyson_1996.jpg">
        <h3>Mike Tyson</h3>
    </a>

    <a class="card" href="floyd-mayweather.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Floyd_Mayweather_Jr_2015.jpg">
        <h3>Floyd Mayweather</h3>
    </a>

    <a class="card" href="canelo-alvarez.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Sa%C3%BAl_%22Canelo%22_%C3%81lvarez.jpg">
        <h3>Canelo Alvarez</h3>
    </a>

    <a class="card" href="sugar-ray-robinson.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Sugar_Ray_Robinson_1951.jpg">
        <h3>Sugar Ray Robinson</h3>
    </a>

    <a class="card" href="rocky-marciano.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Rocky_Marciano_1952.jpg">
        <h3>Rocky Marciano</h3>
    </a>

</div>

</body>
</html>
