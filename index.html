<!DOCTYPE html>
<html>
<head>
    <title>BoxWiki Database</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0b0b;
            color: white;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #111;
            height: 100vh;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 {
            color: gold;
            font-size: 18px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
            font-size: 14px;
        }

        .sidebar a:hover {
            color: gold;
        }

        /* Main content */
        .main {
            margin-left: 240px;
            padding: 20px;
            width: 100%;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
        }

        /* Grid system */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1c1c1c;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #2a2a2a;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
            font-size: 15px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>BoxWiki 📊</h2>

    <a href="#hall">🏆 Hall of Fame</a>
    <a href="#heavy">🥊 Heavyweights</a>
    <a href="#active">🔥 Active Fighters</a>
    <a href="#goats">👑 GOATs</a>
</div>

<!-- Main -->
<div class="main">

    <div class="title">Boxing Database</div>
    <div class="subtitle">Stats, legends, and fighters archive</div>

    <!-- Hall of Fame -->
    <h2 id="hall">🏆 Hall of Fame</h2>
    <div class="grid">

        <a class="card" href="muhammad-ali.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Muhammad_Ali%2C_1967.jpg/600px-Muhammad_Ali%2C_1967.jpg">
        

            <h3>Muhammad Ali</h3>
        </a>

        <a class="card" href="mike-tyson.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Mike_Tyson_1996.jpg/600px-Mike_Tyson_1996.jpg">
            <h3>Mike Tyson</h3>
        </a>

        <a class="card" href="floyd-mayweather.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Floyd_Mayweather_Jr_2015.jpg/600px-Floyd_Mayweather_Jr_2015.jpg">
            <h3>Floyd Mayweather</h3>
        </a>

        <a class="card" href="canelo-alvarez.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Sa%C3%BAl_%22Canelo%22_%C3%81lvarez.jpg/600px-Sa%C3%BAl_%22Canelo%22_%C3%81lvarez.jpg">
            <h3>Canelo Alvarez</h3>
        </a>

        <a class="card" href="sugar-ray-robinson.html">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Sugar_Ray_Robinson_1951.jpg/600px-Sugar_Ray_Robinson_1951.jpg">
            <h3>Sugar Ray Robinson</h3>
        </a>

        <a class="card" href="rocky-marciano.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Rocky_Marciano_1952.jpg/600px-Rocky_Marciano_1952.jpg">
            <h3>Rocky Marciano</h3>
        </a>

    </div>

</div>

</body>
</html>
