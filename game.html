🥊 Fighter selection (Tyson vs Ali stats)<!DOCTYPE html>
<html>
<head>
<title>Boxing Game v3</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.hidden{display:none;}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;7y
    margin:10px;
    cursor:pointer;
    display:inline-block;
    width:200px;
}

.container{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.bar{
    height:12px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:gold;
    width:100%;
}

button{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#result{
    margin-top:15px;
    font-size:22px;
    color:gold;
}
</style>
</head>

<body>

<h1>🥊 Boxing Game v3</h1>

<!-- 🥊 FIGHTER SELECT SCREEN -->
<div id="selectScreen">

<h2>Select Your Fighter</h2>

<div class="card" onclick="selectPlayer('Tyson')">Mike Tyson</div>
<div class="card" onclick="selectPlayer('Ali')">Muhammad Ali</div>
<div class="card" onclick="selectPlayer('Mayweather')">Floyd Mayweather</div>

<h2>Select AI Fighter</h2>

<div class="card" onclick="selectAI('Tyson')">Mike Tyson</div>
<div class="card" onclick="selectAI('Ali')">Muhammad Ali</div>
<div class="card" onclick="selectAI('Mayweather')">Floyd Mayweather</div>

<br>
<button onclick="startGame()">Start Fight 🥊</button>

</div>

<!-- 🥊 GAME SCREEN -->
<div id="gameScreen" class="hidden">

<h2 id="round">Round 1 / 5</h2>

<div class="container">

<div>
<h3 id="playerName">Player</h3>
<p>HP: <span id="pHp">100</span></p>
<div class="bar"><div class="fill" id="pBar"></div></div>
<button onclick="attack()">Punch 👊</button>
</div>

<div>
<h3 id="aiName">AI</h3>
<p>HP: <span id="eHp">100</span></p>
<div class="bar"><div class="fill" id="eBar"></div></div>
</div>

</div>

<div id="result"></div>

</div>

<script>

let fighters = {
"Tyson": {hp:100, power:15},
"Ali": {hp:100, power:10},
"Mayweather": {hp:100, power:8}
};

let player = "Tyson";
let ai = "Ali";
<script>

let hp = 100;
let wins = 0;
let rankIndex = 0;

let ranks = [
"Local Gym Fighter",
"Amateur Boxer",
"Regional Contender",
"National Competitor",
"Top Prospect",
"World Ranked Fighter"
];

function startCareer(){
document.getElementById("startScreen").style.display = "none";
document.getElementById("fightScreen").style.display = "block";
loadFight();
}

function loadFight(){

hp = 100;

document.getElementById("opponent").innerText = ranks[rankIndex];

document.getElementById("hp").innerText = hp;
document.getElementById("bar").style.width = "100%";

document.getElementById("result").innerText = "";
}

function punch(){

if(rankIndex >= ranks.length - 1){
document.getElementById("result").innerHTML =
"🏆 You are already at the top level!";
return;
}

let damage = Math.floor(Math.random() * 15) + 5;
hp -= damage;

document.getElementById("hp").innerText = hp;
document.getElementById("bar").style.width = hp + "%";

if(hp <= 0){

wins++;
rankIndex++;

document.getElementById("result").innerHTML =
"🏆 You defeated " + ranks[rankIndex - 1] +
" | Wins: " + wins;

setTimeout(loadFight, 1500);
}
}

</script>
