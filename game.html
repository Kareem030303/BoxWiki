🥊 Fighter selection (Tyson vs Ali stats)<!DOCTYPE html>
<html>
<head>
<title>Boxing Game v3</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.hidden{display:none;}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    margin:10px;
    cursor:pointer;
    display:inline-block;
    width:200px;
}

.container{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.bar{
    height:12px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:gold;
    width:100%;
}

button{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#result{
    margin-top:15px;
    font-size:22px;
    color:gold;
}
</style>
</head>

<body>

<h1>🥊 Boxing Game v3</h1>

<!-- 🥊 FIGHTER SELECT SCREEN -->
<div id="selectScreen">

<h2>Select Your Fighter</h2>

<div class="card" onclick="selectPlayer('Tyson')">Mike Tyson</div>
<div class="card" onclick="selectPlayer('Ali')">Muhammad Ali</div>
<div class="card" onclick="selectPlayer('Mayweather')">Floyd Mayweather</div>

<h2>Select AI Fighter</h2>

<div class="card" onclick="selectAI('Tyson')">Mike Tyson</div>
<div class="card" onclick="selectAI('Ali')">Muhammad Ali</div>
<div class="card" onclick="selectAI('Mayweather')">Floyd Mayweather</div>

<br>
<button onclick="startGame()">Start Fight 🥊</button>

</div>

<!-- 🥊 GAME SCREEN -->
<div id="gameScreen" class="hidden">

<h2 id="round">Round 1 / 5</h2>

<div class="container">

<div>
<h3 id="playerName">Player</h3>
<p>HP: <span id="pHp">100</span></p>
<div class="bar"><div class="fill" id="pBar"></div></div>
<button onclick="attack()">Punch 👊</button>
</div>

<div>
<h3 id="aiName">AI</h3>
<p>HP: <span id="eHp">100</span></p>
<div class="bar"><div class="fill" id="eBar"></div></div>
</div>

</div>

<div id="result"></div>

</div>

<script>

let fighters = {
"Tyson": {hp:100, power:15},
"Ali": {hp:100, power:10},
"Mayweather": {hp:100, power:8}
};

let player = "Tyson";
let ai = "Ali";

let pHp = 100;
let eHp = 100;

let round = 1;
let maxRounds = 5;

function selectPlayer(name){
player = name;
alert("Player selected: " + name);
}

function selectAI(name){
ai = name;
alert("AI selected: " + name);
}

function startGame(){

document.getElementById("selectScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

document.getElementById("playerName").innerText = player;
document.getElementById("aiName").innerText = ai;

pHp = fighters[player].hp;
eHp = fighters[ai].hp;

update();
}

function update(){

document.getElementById("pHp").innerText = pHp;
document.getElementById("eHp").innerText = eHp;

document.getElementById("pBar").style.width = pHp + "%";
document.getElementById("eBar").style.width = eHp + "%";

document.getElementById("round").innerText = "Round " + round + " / " + maxRounds;
}

function attack(){

let dmg = fighters[player].power + Math.floor(Math.random() * 10);
eHp -= dmg;

update();

if(eHp <= 0){
    endGame(player + " Wins by KO 🏆");
    return;
}

setTimeout(aiAttack, 800);
}

function aiAttack(){

let dmg = fighters[ai].power + Math.floor(Math.random() * 8);
pHp -= dmg;

update();

if(pHp <= 0){
    endGame(ai + " Wins by KO 🤖");
}
}

function endGame(text){
document.getElementById("result").innerText = text;
}

update();

</script>

</body>
</html>
