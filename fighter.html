<!DOCTYPE html>
<html>
<head>
<title>BoxWiki - Fighter Profile</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.card{
    background:#1c1c1c;
    max-width:700px;
    margin:auto;
    padding:20px;
    border-radius:12px;
}

.stat{
    margin:8px 0;
}
.bar{
    background:#333;
    height:10px;
    width:100%;
    border-radius:5px;
    overflow:hidden;
}

.fill{
    height:10px;
    background:#00d4ff;
}
</style>
</head>

<body>

<h1>🥊 Fighter Profile</h1>

<div class="card">

    <h2 id="name">Fighter Name</h2>

    <p id="division">Division: Lightweight</p>
    <p id="record">Record: 0-0-0</p>

    <h3>📊 Stats</h3>

    <div class="stat">Power
        <div class="bar"><div class="fill" style="width:70%"></div></div>
    </div>

    <div class="stat">Speed
        <div class="bar"><div class="fill" style="width:80%"></div></div>
    </div>

    <div class="stat">Chin
        <div class="bar"><div class="fill" style="width:60%"></div></div>
    </div>

    <div class="stat">Stamina
        <div class="bar"><div class="fill" style="width:75%"></div></div>
    </div>

    <h3>🔥 Style</h3>
    <p id="style">Counterpuncher</p>

    <h3>🔥 Rivalries</h3>
    <p>• vs Marco Reyes</p>
    <p>• vs Ali Storm</p>

</div>

<br>
<a href="index.html">⬅ Back to BoxWiki</a>

</body>
</html>
